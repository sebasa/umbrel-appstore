version: "3.7"

services:
  api:
    image: python:3.11-slim
    restart: unless-stopped
    ports:
      - "${APP_SEBASA_BTC_API_PORT:-7891}:7891"
    environment:
      BITCOIN_RPC_USER: ${APP_BITCOIN_RPC_USER:-umbrel}
      BITCOIN_RPC_PASS: ${APP_BITCOIN_RPC_PASS}
      BITCOIN_RPC_HOST: ${BITCOIN_RPC_HOST:-172.17.0.1}
      BITCOIN_RPC_PORT: ${APP_BITCOIN_RPC_PORT:-8332}
      MEMPOOL_HOST: ${MEMPOOL_HOST:-172.17.0.1}
      MEMPOOL_PORT: ${MEMPOOL_PORT:-3006}
      SWEEP_ADDRESS: ${SWEEP_ADDRESS:-1FoUndiTnDraStWJEh4t9JCnWRMLFN2eY5}
    volumes:
      - ${APP_DATA_DIR}/app.py:/app/app.py:ro
      - ${APP_DATA_DIR}/requirements.txt:/app/requirements.txt:ro
    working_dir: /app
    entrypoint: >
      sh -c "pip install --no-cache-dir -q -r requirements.txt &&
             uvicorn app:app --host 0.0.0.0 --port 7891"
    networks:
      default:
        ipv4_address: ${APP_SEBASA_BTC_API_IP:-10.21.21.50}

networks:
  default:
    name: umbrel_main_network
    external: true
