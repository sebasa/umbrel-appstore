version: "3.7"

services:
  btc-api:
    build: .
    container_name: sebasa-btc-api
    restart: unless-stopped
    ports:
      - "7891:7891"
    environment:
      BITCOIN_RPC_USER: ${APP_BITCOIN_RPC_USER:-umbrel}
      BITCOIN_RPC_PASS: ${APP_BITCOIN_RPC_PASS}
      BITCOIN_RPC_HOST: ${APP_BITCOIN_NODE_IP:-100.88.134.1}
      BITCOIN_RPC_PORT: ${APP_BITCOIN_RPC_PORT:-8332}
      MEMPOOL_HOST: ${APP_MEMPOOL_API_IP:-100.88.134.1}
      MEMPOOL_PORT: ${APP_MEMPOOL_API_PORT:-3006}
      SWEEP_ADDRESS: ${APP_SWEEP_ADDRESS:-}
    networks:
      default:
        ipv4_address: $APP_BTC_API_IP

networks:
  default:
    name: umbrel_main_network
    external: true
