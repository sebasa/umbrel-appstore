description: >-
  Unlock the full potential of your Umbrel node with this lightweight, lightning-fast REST API. Built on FastAPI, it seamlessly connects to your local Bitcoin Core and Mempool instances, allowing you to interact with the blockchain entirely privately—without relying on external third-party servers.

  Easily query blockchain info, broadcast raw transactions, check real-time fee rates, inspect addresses, and monitor UTXOs. It also includes advanced cryptographic endpoints, such as the ability to extract ECDSA signature values (R, S, Z) directly from raw transactions.

  Whether you are a developer building sovereign Bitcoin applications, or just a node operator wanting programmable access to your own data, this API provides everything you need with zero bloat.
