version: "3.7"

services:
  web:
    image: cstaelen/tidarr:latest
    container_name: "tidarr"
    restart: on-failure
    stop_grace_period: 1m
    ports:
      - "${APP_TIDARR_PORT:-7892}:8484"
    volumes:
      - ${APP_DATA_DIR}/config:/shared
      - ${APP_DATA_DIR}/music:/music
    environment:
      - PORT=8484
      - PUID=1000
      - PGID=1000
