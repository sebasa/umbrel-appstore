id: sebasa-mempool-watcher
category: Finance
name: Mempool Bitcoin Watcher
version: "1.0.0"
tagline: Monitor Bitcoin addresses & fire webhooks via your Mempool node
description: >-
  Never miss a transaction again. Mempool Bitcoin Watcher turns your Umbrel node into a powerful, real-time alerting system. By utilizing zero-polling WebSocket connections to your local Mempool instance, it instantly detects when watched addresses send or receive funds and fires off customizable webhooks to your preferred services.

  Whether you want to build automated accounting, notify a Telegram/Discord bot, or trigger custom scripts the second a transaction hits the mempool, this tool handles the heavy lifting.

  Key Features:

  • Real-time WebSocket monitoring — Instant detection without heavy polling.

  • Smart Organization — Group addresses into categories, each with independent webhook URLs and HMAC secrets for secure signature verification.

  • Beautiful Web Dashboard — Easily manage your watchlists, track node stats, and review a full history of detected transactions and webhook delivery logs.

  • Seamless Operation — Automatically syncs changes and reconnects in the background without needing to restart the app.

