version: "3.7"

services:
  btc-api:
    build: .
    container_name: btc-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      BITCOIN_RPC_USER: ${APP_BITCOIN_RPC_USER:-umbrel}
      BITCOIN_RPC_PASS: ${APP_BITCOIN_RPC_PASS}
      BITCOIN_RPC_HOST: ${APP_BITCOIN_NODE_IP:-10.21.21.8}
      BITCOIN_RPC_PORT: ${APP_BITCOIN_RPC_PORT:-8332}
      MEMPOOL_HOST: ${APP_MEMPOOL_API_IP:-10.21.21.26}
      MEMPOOL_PORT: ${APP_MEMPOOL_API_PORT:-8999}
      SWEEP_ADDRESS: ${APP_SWEEP_ADDRESS:-}
    networks:
      default:
        ipv4_address: $APP_BTC_API_IP

networks:
  default:
    name: umbrel_main_network
    external: true
