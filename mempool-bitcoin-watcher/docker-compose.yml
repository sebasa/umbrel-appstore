version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: sebasa-mempool-watcher_web_1
      APP_PORT: 7890

  web:
    image: ghcr.io/sebasa/mempool-bitcoin-watcher:latest
    restart: on-failure
    stop_grace_period: 1m
    volumes:
      - ${APP_DATA_DIR}/data:/data
    environment:
      MEMPOOL_URL: "http://umbrel.local:3006"
      WEBHOOK_URL: ""
      WEBHOOK_SECRET: ""
      DB_PATH: /data/watcher.db
      RECONNECT_DELAY: "10"
      WATCHLIST_SYNC: "60"
      REQUEST_TIMEOUT: "10"
